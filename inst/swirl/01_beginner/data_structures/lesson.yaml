- Class: meta
  Course: RMastery
  Lesson: Data Structures
  Author: Clinton Moshe Mwachia

- Class: text
  Output: |
    Welcome to Data Structures in R!
    In this lesson, you will learn about vectors, lists, matrices, and data frames.

- Class: cmd_question
  Output: Create a vector called animals with 5 animals.
  CorrectAnswer: animals <- c("Lion","Elephant","Buffalo","Leopard","Rhino")
  AnswerTests: test_vector()
  Hint: Use c() to create a vector

- Class: cmd_question
  Output: Find the length of animals
  CorrectAnswer: length(animals)
  AnswerTests: omnitest(correctExpr='length(animals)')
  Hint: Use length()

- Class: cmd_question
  Output: Extract the 1st, 3rd and 5th animals
  CorrectAnswer: animals[c(1,3,5)]
  AnswerTests: omnitest(correctExpr='animals[c(1,3,5)]')
  Hint: Use indexing with c()

- Class: cmd_question
  Output: Create a list called my_list containing animals
  CorrectAnswer: my_list <- list(animals)
  AnswerTests: omnitest(correctExpr='my_list <- list(animals)')
  Hint: Use list()

- Class: cmd_question
  Output: Create a matrix A with values 1 to 6 and 2 rows
  CorrectAnswer: A <- matrix(c(1,2,3,4,5,6), nrow=2)
  AnswerTests: omnitest(correctExpr='A <- matrix(c(1,2,3,4,5,6), nrow=2)')
  Hint: Use matrix()

- Class: cmd_question
  Output: Find dimensions of A
  CorrectAnswer: dim(A)
  AnswerTests: omnitest(correctExpr='dim(A)')
  Hint: Use dim()

- Class: cmd_question
  Output: Create a data frame df with column one = c(10.5,11,23,4)
  CorrectAnswer: df <- data.frame(one=c(10.5,11,23,4))
  AnswerTests: omnitest(correctExpr='df <- data.frame(one=c(10.5,11,23,4))')
  Hint: Use data.frame()

- Class: text
  Output: |
    🎉 Congratulations! You have completed the Data Structures lesson.